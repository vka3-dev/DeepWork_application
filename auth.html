<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DeepWork - Productivity Calendar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "secondary-container": "#4b4b52",
                "on-secondary": "#303037",
                "on-primary-fixed": "#172554",
                "surface-variant": "#353437",
                "on-tertiary-fixed-variant": "#7f2a21",
                "background": "#131315",
                "secondary-fixed": "#e3e1ea",
                "on-secondary-container": "#bcbbc3",
                "inverse-surface": "#e5e1e4",
                "inverse-on-surface": "#313032",
                "surface-bright": "#39393b",
                "surface-container-highest": "#353437",
                "inverse-primary": "#2563eb",
                "on-tertiary-fixed": "#410001",
                "on-surface-variant": "#bccbb9",
                "surface-tint": "#60a5fa",
                "on-error": "#690005",
                "error": "#ffb4ab",
                "on-background": "#e5e1e4",
                "on-secondary-fixed": "#1b1b21",
                "error-container": "#93000a",
                "tertiary-container": "#ff8b7c",
                "on-tertiary": "#60130d",
                "on-surface": "#e5e1e4",
                "primary-fixed": "#bfdbfe",
                "primary-container": "#2563eb",
                "surface-container-lowest": "#0e0e10",
                "secondary-fixed-dim": "#c7c5ce",
                "outline-variant": "#3f3f46",
                "on-secondary-fixed-variant": "#46464d",
                "outline": "#71717a",
                "primary-fixed-dim": "#60a5fa",
                "tertiary-fixed": "#ffdad5",
                "secondary": "#c7c5ce",
                "tertiary-fixed-dim": "#ffb4a9",
                "on-error-container": "#ffdad6",
                "on-primary-fixed-variant": "#1d4ed8",
                "primary": "#3b82f6",
                "on-primary-container": "#eff6ff",
                "tertiary": "#ffb5ab",
                "surface-dim": "#131315",
                "on-primary": "#eff6ff",
                "surface-container": "#201f22",
                "surface": "#131315",
                "surface-container-low": "#1c1b1d",
                "on-tertiary-container": "#76231b",
                "surface-container-high": "#2a2a2c"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "spacing": {
                "gutter": "24px",
                "margin-desktop": "48px",
                "stack-md": "16px",
                "margin-mobile": "16px",
                "unit": "4px",
                "stack-lg": "32px",
                "stack-sm": "8px",
                "container-max": "1200px"
            },
            "fontFamily": {
                "headline-md": ["Inter"],
                "label-sm": ["JetBrains Mono"],
                "label-md": ["JetBrains Mono"],
                "headline-lg": ["Inter"],
                "display": ["Inter"],
                "body-lg": ["Inter"],
                "body-md": ["Inter"]
            },
            "fontSize": {
                "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: #09090b; /* Base Layer */
            color: #e5e1e4;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .ghost-border {
            border: 1px solid #3f3f46;
        }
        .active-border {
            border: 1px solid #fafafa;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-gutter">
<main class="w-full max-w-md">
    <section class="bg-surface-container-low border border-outline-variant rounded-xl p-gutter shadow-2xl">
        <div class="mb-stack-lg">
            <div class="flex items-center gap-stack-sm mb-stack-lg">
                <span class="material-symbols-outlined text-primary">timer</span>
                <span class="font-headline-md text-headline-md text-on-surface">DeepWork</span>
            </div>
            <h1 class="font-display text-4xl text-on-surface mb-stack-sm" id="auth-title">Welcome back</h1>
            <p class="font-body-md text-body-md text-on-surface-variant" id="auth-subtitle">Enter DeepWork and continue your focus.</p>
        </div>

        <form id="auth-form" class="space-y-stack-md">
            <div>
                <label class="block font-label-sm text-label-sm text-on-surface-variant mb-unit" for="auth-email">Email</label>
                <input id="auth-email" type="email" autocomplete="email" required
                    class="w-full h-12 px-stack-md rounded-lg bg-surface-container-high border border-outline-variant text-on-surface outline-none focus:border-primary transition-colors"
                    placeholder="you@example.com">
            </div>
            <div>
                <label class="block font-label-sm text-label-sm text-on-surface-variant mb-unit" for="auth-password">Password</label>
                <input id="auth-password" type="password" autocomplete="current-password" required minlength="8"
                    class="w-full h-12 px-stack-md rounded-lg bg-surface-container-high border border-outline-variant text-on-surface outline-none focus:border-primary transition-colors"
                    placeholder="Minimum 8 characters">
            </div>

            <p id="auth-error" class="hidden p-stack-sm rounded-lg border border-outline-variant bg-surface-container-high text-on-surface-variant font-label-sm text-label-sm"></p>

            <button id="auth-submit" type="submit"
                class="w-full bg-[#3B82F6] text-[#09090B] h-12 rounded-lg font-label-md text-label-md font-bold hover:bg-[#60A5FA] active:scale-95 transition-colors disabled:opacity-50">
                Login
            </button>
        </form>

        <div class="mt-stack-lg flex items-center justify-center gap-unit font-label-sm text-label-sm text-on-surface-variant">
            <span id="auth-mode-prompt">New to DeepWork?</span>
            <button id="auth-mode-toggle" type="button" class="text-primary hover:underline">Register</button>
        </div>
    </section>
</main>
<script src="js/storage.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body></html>
